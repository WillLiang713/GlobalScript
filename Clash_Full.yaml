# 自建节点代理组
- name: 自建节点
  type: select
  include-all: true
  filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/WillLiang713/GlobalScript/main/icons/zashboard/self-hosted.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 美国故障转移代理组
- name: 美国故障转移
  type: fallback
  include-all: true
  filter: "(?i)🇺🇸|美|US|USA|United ?States|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|Portland|Dallas|Oregon|Phoenix|Fremont|Silicon Valley|Las Vegas|Los Angeles|San Jose|Santa Clara|Seattle|Chicago"
  exclude-filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/WillLiang713/GlobalScript/main/icons/zashboard/usa.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 新加坡故障转移代理组
- name: 新加坡故障转移
  type: fallback
  include-all: true
  filter: "(?i)🇸🇬|SG|SGP|Singapore|新加坡|狮城"
  icon: "https://raw.githubusercontent.com/WillLiang713/GlobalScript/main/icons/zashboard/singapore.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 日本故障转移代理组
- name: 日本故障转移
