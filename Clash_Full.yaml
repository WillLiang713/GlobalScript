rules:
# 局域网 / 私有地址
- GEOSITE,private,直接连接
- GEOIP,private,直接连接,no-resolve

# 中国大陆可直连的境外厂商服务
- GEOSITE,apple-cn,直接连接
- GEOSITE,google-cn,直接连接



# 中国大陆顶级域名
- GEOSITE,tld-cn,直接连接

# 测速工具
- GEOSITE,category-speedtest,网络测速

# 流媒体服务
- GEOSITE,category-entertainment,流媒体

# Google
- GEOSITE,google,Google

# AI 服务
- GEOSITE,category-ai-!cn,AI服务

# 开发协作
- GEOSITE,category-dev,开发协作

# Zoom
- GEOSITE,zoom,Zoom

# 游戏平台（交给客户端加速器处理，全部直连）
- GEOSITE,category-games,直接连接

# 即时通讯
- GEOSITE,category-communication,即时通讯
- GEOSITE,category-social-media-!cn,即时通讯

# 非中国大陆域名兜底
- GEOSITE,geolocation-!cn,兜底分流

# 国内兜底 (域名)
- GEOSITE,cn,直接连接

# 国内兜底 (IP)
- GEOIP,CN,直接连接

# 最终兜底
- MATCH,兜底分流
