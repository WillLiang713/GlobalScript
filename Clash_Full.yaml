# Clash 配置文件 (YAML格式)
# 适用于 OpenClash 和 Clash 核心
# 包含常用的分流规则和代理组配置

proxy-groups:
# 手动选择代理组 - 用户可以手动切换代理节点
- name: 手动选择
  type: select
  icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Static.png"
  include-all: true
  url: https://cp.cloudflare.com/generate_204
  interval: 300

# 自动选择代理组 - 根据延迟自动选择最优节点
- name: 延迟优选
  type: url-test
  include-all: true
  icon: "https://fastly.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

