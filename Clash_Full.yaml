  include-all: true
  filter: "(?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|Tokyo|Osaka"
  icon: "https://raw.githubusercontent.com/WillLiang713/GlobalScript/main/icons/zashboard/japan.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 原生家宽节点代理组
- name: 原生家宽
  type: select
  include-all: true
  filter: "(?i)((家宽|住宅|residential|isp|broadband).*(原生|native))|((原生|native).*(家宽|住宅|residential|isp|broadband))"
