rules:
# 局域网
- GEOSITE,private,全球直连

- GEOIP,private,全球直连

# Apple 中国服务
- GEOSITE,apple-cn,全球直连

# 谷歌中国服务
- GEOSITE,google-cn,全球直连

# 游戏直连服务
- GEOSITE,category-games@cn,全球直连

# Steam 游戏服务器
- DOMAIN-SUFFIX,steamserver.net,全球直连

# 测速工具
- GEOSITE,category-speedtest,测速工具

# 国外论坛
- GEOSITE,category-forums,国外论坛
- GEOSITE,youtube,YouTube
- GEOSITE,google,谷歌

# OpenAI
- GEOSITE,openai,OpenAI

# Anthropic
- GEOSITE,anthropic,Anthropic

# X
- GEOSITE,x,X

# 国外 AI
- GEOSITE,category-ai-!cn,国外AI

# 开发平台
- GEOSITE,category-dev,国外开发

# Zoom 会议
- GEOSITE,zoom,Zoom

# 游戏平台
- GEOSITE,category-games,游戏平台

# 流媒体服务
- GEOSITE,netflix,Netflix
- GEOSITE,tiktok,TikTok
- GEOSITE,category-entertainment,国外娱乐

# 社交网络
- GEOSITE,category-communication,社交通讯
- GEOSITE,category-social-media-!cn,社交通讯

- GEOSITE,apple,苹果
- GEOSITE,microsoft,微软

# 国内兜底 (域名)
- GEOSITE,cn,全球直连

# 国内兜底 (IP)
- GEOIP,cn,全球直连

# 最终兜底
- MATCH,漏网之鱼
