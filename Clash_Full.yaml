# Clash 配置文件 (YAML格式)
# 适用于 OpenClash 和 Clash 核心
# 包含常用的分流规则和代理组配置

# 启用统一延迟计算方式，去除握手等额外延迟
unified-delay: true

# 启用 TCP 并发连接，可提高连接建立速度
tcp-concurrent: true

proxy-groups:
# 手动切换代理组 - 用户可以手动切换代理节点
- name: 手动切换
  type: select
  icon: "https://raw.githubusercontent.com/WillLiang713/GlobalScript/main/icons/zashboard/manual-switch.png"
  include-all: true
  url: https://cp.cloudflare.com/generate_204
  interval: 300

# 智能优选代理组 - 根据延迟自动选择最优节点
- name: 智能优选
  type: url-test
  include-all: true
  icon: "https://raw.githubusercontent.com/WillLiang713/GlobalScript/main/icons/zashboard/smart-select.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# OpenAI 代理组
- name: OpenAI
  type: select
  icon: "https://raw.githubusercontent.com/WillLiang713/GlobalScript/main/icons/zashboard/openai.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 智能优选
  - 直接连接
  - 手动切换
  - 原生家宽
  - 自建节点
  - 美国故障转移
  - 新加坡故障转移
  - 日本故障转移
  - 香港节点
  - 台湾节点
  - 新加坡节点
  - 日本节点
  - 韩国节点
  - 美国节点
  - 其他节点

