# Clash 配置文件 (YAML格式)
# 适用于 OpenClash 和 Clash 核心
# 包含常用的分流规则和代理组配置

proxy-groups:
# 手动切换代理组 - 用户可以手动切换代理节点
- name: 手动切换
  type: select
  icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Manual.png"
  include-all: true
  url: https://cp.cloudflare.com/generate_204
  interval: 300

# 智能优选代理组 - 根据延迟自动选择最优节点
- name: 智能优选
  type: url-test
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# Google 代理组
- name: Google
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Google_Search.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 智能优选
  - 直接连接
  - 手动切换
  - 自建节点
  - 香港节点
  - 台湾节点
  - 新加坡节点
  - 日本节点
  - 韩国节点
  - 美国节点
  - 其他节点

