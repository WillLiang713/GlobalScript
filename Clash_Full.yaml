rules:
# 局域网
- GEOSITE,private,直接连接

- GEOIP,private,直接连接

# Apple 中国服务
- GEOSITE,apple-cn,直接连接

# 谷歌中国服务
- GEOSITE,google-cn,直接连接

# 游戏直连服务
- GEOSITE,category-games@cn,直接连接

# Steam 游戏服务器
- DOMAIN-SUFFIX,steamserver.net,直接连接

# 测速工具
- GEOSITE,category-speedtest,网络测速

# 社区论坛
- GEOSITE,category-forums,社区论坛
- GEOSITE,youtube,YouTube
- GEOSITE,google,Google

# OpenAI
- GEOSITE,openai,OpenAI

# Anthropic
- GEOSITE,anthropic,Anthropic

# X
- GEOSITE,x,X

# AI 服务
- GEOSITE,category-ai-!cn,AI服务

# GitHub
- GEOSITE,github,GitHub

# 开发协作
- GEOSITE,category-dev,开发协作

# Zoom
- GEOSITE,zoom,Zoom

# 游戏平台
- GEOSITE,category-games,游戏平台

# 流媒体服务
- GEOSITE,netflix,Netflix
- GEOSITE,tiktok,TikTok
- GEOSITE,category-entertainment,流媒体

# 即时通讯
- GEOSITE,category-communication,即时通讯
- GEOSITE,category-social-media-!cn,即时通讯

- GEOSITE,apple,苹果服务
