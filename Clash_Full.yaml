# Clash 配置文件 (YAML格式)
# 适用于 OpenClash 和 Clash 核心
# 精简分流：国内/局域网/游戏直连，其他流量统一进入「代理出口」

proxy-groups:
# 统一代理出口 - 国外流量和最终兜底都进入这里，放在最前方便面板快速选择
- name: 代理出口
  type: select
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Final.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  proxies:
  - 智能优选
  - 手动切换
  - 自建节点
  - 香港节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 台湾节点
  - 韩国节点
  - 其他节点
  - DIRECT

# 手动切换代理组 - 用户可以手动切换代理节点
- name: 手动切换
  type: select
  icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Manual.png"
  include-all: true
  url: https://cp.cloudflare.com/generate_204
  interval: 300

# 智能优选代理组 - 根据延迟自动选择最优节点
- name: 智能优选
  type: url-test
  include-all: true
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Auto.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 自建节点代理组
- name: 自建节点
  type: select
  include-all: true
  filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Server.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 地区代理组 - 香港
- name: 香港节点
  type: url-test
  include-all: true
  filter: "(?i)🇭🇰|港|HK|HKG|HongKong|Hong Kong|香港"
  exclude-filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Hong_Kong.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 地区代理组 - 美国
- name: 美国节点
  type: url-test
  include-all: true
  filter: "(?i)🇺🇸|美|US|USA|United ?States|美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|Portland|Dallas|Oregon|Phoenix|Fremont|Silicon Valley|Las Vegas|Los Angeles|San Jose|Santa Clara|Seattle|Chicago"
  exclude-filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/US.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300
  tolerance: 50

# 地区代理组 - 日本
- name: 日本节点
  type: url-test
  include-all: true
  filter: "(?i)🇯🇵|日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan|Tokyo|Osaka"
  exclude-filter: "(?i)自建"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Japan.png"
  interval: 300
  tolerance: 50

# 地区代理组 - 新加坡
- name: 新加坡节点
  type: url-test
  include-all: true
  filter: "(?i)🇸🇬|SG|SGP|Singapore|新加坡|狮城"
  exclude-filter: "(?i)自建"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Singapore.png"
  interval: 300
  tolerance: 50

# 地区代理组 - 台湾
- name: 台湾节点
  type: url-test
  include-all: true
  filter: "(?i)🇹🇼|台|TW|Taiwan|台湾|台灣|台北|Taipei|桃園|Taoyuan|HiNet"
  exclude-filter: "(?i)自建"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/China.png"
  interval: 300
  tolerance: 50

# 地区代理组 - 韩国
- name: 韩国节点
  type: url-test
  include-all: true
  filter: "(?i)🇰🇷|韩|KR|Korea|韩国|首尔|Seoul"
  exclude-filter: "(?i)自建"
  url: https://cp.cloudflare.com/generate_204
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Korea.png"
  interval: 300
  tolerance: 50

# 其他地区代理组
- name: 其他节点
  type: select
  include-all: true
  filter: "^(?!.*(港|HK|HKG|HongKong|Hong Kong|美|US|USA|United States|美国|洛杉矶|Los Angeles|圣何塞|San Jose|硅谷|日本|JP|Japan|东京|Tokyo|大阪|Osaka|新加坡|SG|SGP|Singapore|狮城|台|TW|Taiwan|台湾|台灣|台北|Taipei|桃園|Taoyuan|HiNet|韩|KR|Korea|韩国|首尔|Seoul)).*"
  exclude-filter: "(?i)自建"
  icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png"
  url: https://cp.cloudflare.com/generate_204
  interval: 300

rules:
# 局域网 / 私有地址
- GEOSITE,private,DIRECT
- GEOIP,private,DIRECT,no-resolve

# 中国大陆可直连的境外厂商服务
- GEOSITE,apple-cn,DIRECT
- GEOSITE,google-cn,DIRECT

# 游戏平台：必须直连，避免和游戏加速器冲突
- GEOSITE,category-games,DIRECT

# 非中国大陆域名统一走代理出口
- GEOSITE,geolocation-!cn,代理出口

# 国内兜底 (域名)
- GEOSITE,cn,DIRECT

# 国内兜底 (IP)
- GEOIP,CN,DIRECT

# 最终兜底
- MATCH,代理出口
